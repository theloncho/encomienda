<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container">
    <a class="navbar-brand" href="{% if user.is_authenticated %}{% url 'dashboard' %}{% else %}{% url 'login' %}{% endif %}">
      <i class="fas fa-shipping-fast me-2"></i>Encomiendas
    </a>

    <!-- Hamburger menu for mobile -->
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      {% if user.is_authenticated %}
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'encomienda_lista' or request.resolver_match.url_name == 'encomienda_detalle' %}active{% endif %}" href="{% url 'encomienda_lista' %}">Encomiendas</a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% if request.resolver_match.url_name == 'encomienda_crear' %}active{% endif %}" href="{% url 'encomienda_crear' %}">Nueva</a>
          </li>
        </ul>
        <div class="d-flex align-items-center">
          <span class="navbar-text text-white me-3">
            <i class="fas fa-user me-1"></i>{{ user.get_full_name|default:user.username }}
          </span>
          <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
            <i class="fas fa-sign-out-alt me-1"></i>Salir
          </a>
        </div>
      {% else %}
        <ul class="navbar-nav me-auto"></ul>
        <div class="d-flex align-items-center">
            <a href="{% url 'login' %}" class="btn btn-outline-light">
              <i class="fas fa-sign-in-alt me-1"></i>Iniciar sesión
            </a>
        </div>
      {% endif %}
    </div>
  </div>
</nav>
