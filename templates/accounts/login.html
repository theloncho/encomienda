{% extends 'base.html' %}
{% load static %}
{% block title %}Iniciar Sesión — Encomiendas{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5">
    <div class="text-center mb-4">
      <i class="fas fa-box-open fa-4x text-primary mb-3"></i>
      <h2>Sistema de Encomiendas</h2>
      <p class="text-muted">Ingresa tus credenciales para continuar</p>
    </div>
    <div class="card shadow">
      <div class="card-body p-4">
        {% if form.errors %}
        <div class="alert alert-danger">
          <i class="fas fa-exclamation-triangle me-2"></i>
          Usuario o contraseña incorrectos
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Usuario</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-user"></i></span>
              <input type="text" name="username" class="form-control"
                     placeholder="Tu usuario" required autofocus>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">Contraseña</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock"></i></span>
              <input type="password" name="password" class="form-control"
                     placeholder="Tu contraseña" required>
            </div>
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="fas fa-sign-in-alt me-2"></i>Iniciar Sesión
            </button>
          </div>
          <input type="hidden" name="next" value="{{ next|default:'/dashboard/' }}">
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
